
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NCBK - NEVER SEE BUT K</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'serif'; background: #050505; color: #fff; }
        .screen { display: none; height: 100vh; width: 100%; transition: opacity 1s ease; }
        .active { display: flex; align-items: center; justify-content: center; opacity: 1; }
        
        /* 메인 화면 */
        #main-screen { background: url('watermarked_img_18325188740117090656.jpg') no-repeat center center/cover; }
        .fog-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        #logo { z-index: 1; font-size: 3rem; cursor: pointer; letter-spacing: 0.8rem; border: 1px solid #333; padding: 20px; }

        /* 룩북 화면 */
        #lookbook-screen { background: #ffffff; color: #000; padding: 50px; overflow-y: auto; display: block; }
        .lookbook-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .look img { width: 100%; height: auto; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="main-screen" class="screen active">
        <div class="fog-overlay"></div>
        <h1 id="logo" onclick="showLookbook()">NCBK</h1>
    </div>

    <div id="lookbook-screen" class="screen">
        <div class="lookbook-grid">
            <div class="look"><img src="000cf455-805d-4732-ba11-3b1f4c0c03e4.jpg" alt="Look 1"></div>
            <div class="look"><img src="94820ca3-1e22-45d2-84ff-4df28d0c240d.jpg" alt="Look 2"></div>
            <div class="look"><img src="7f54c0ff-7108-4ff6-9565-faea9e018f7a.jpg" alt="Look 3"></div>
            <div class="look"><img src="63c7db74-45f1-41c5-9481-b990e1c997c9.jpg" alt="Look 4"></div>
            <div class="look"><img src="98389d0a-3ea9-40ba-952b-539fe1577594 (1).jpg" alt="Look 5"></div>
        </div>
    </div>

    <script>
        function showLookbook() {
            document.getElementById('main-screen').classList.remove('active');
            document.getElementById('lookbook-screen').classList.add('active');
        }
    </script>
</body>
</html>
