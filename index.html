<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NCBK</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        #main { 
            height: 100vh; width: 100%; 
            background: url('cave.png') center/cover;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 2rem; border: 1px solid #fff;
        }
        #lookbook { display: none; background: #fff; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; }
        .grid img { width: 100%; }
    </style>
</head>
<body>
    <div id="main" onclick="document.getElementById('lookbook').style.display='block'; this.style.display='none';">ENTER</div>
    <div id="lookbook">
        <div class="grid">
            <img src="look1.jpg.jpg" alt="Look 1">
            <img src="look2.jpg.jpg" alt="Look 2">
            <img src="look3.jpg.jpg" alt="Look 3">
            <img src="look4.jpg.jpg" alt="Look 4">
            <img src="look5.jpg.jpg" alt="Look 5">
        </div>
    </div>
</body>
