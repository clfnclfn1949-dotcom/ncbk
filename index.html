<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NCBK - NEVER SEE BUT K</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a0f0a; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        #main { 
            height: 100vh; width: 100%; 
            background: url('cave.png') no-repeat center center/cover;
            cursor: pointer;
            position: fixed; top: 0; left: 0; z-index: 10;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #lookbook { 
            opacity: 0; visibility: hidden;
            background: #1a0f0a;
            padding: 40px; 
            min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 1s ease 0.3s, visibility 1s ease 0.3s;
        }
        #lookbook.active { opacity: 1; visibility: visible; overflow-y: auto; }
        
        #lookbook-header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; padding: 0 0 40px 0; color: #bca08d; }
        #lookbook-title { font-size: 1.5rem; letter-spacing: 0.3rem; }
        #back-btn { padding: 10px 20px; border: 1px solid #bca08d; background: transparent; color: #bca08d; cursor: pointer; text-decoration: none; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; width: 100%; }
        .grid img { width: 100%; display: block; border: 1px solid #333; cursor: pointer; transition: transform 0.3s; }
        .grid img:hover { transform: scale(1.02); }

        #modal { display: none; position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: pointer; }
        #modal img { max-width: 90%; max-height: 90%; border: 2px solid #bca08d; }
    </style>
</head>
<body>
    
    <div id="main" onclick="showLookbook()"></div>
    
    <div id="lookbook">
        <div id="lookbook-header">
            <div id="lookbook-title">NCPK — COLLECTION</div>
            <a href="#" id="back-btn" onclick="hideLookbook(event)">BACK</a>
        </div>
        <div class="grid">
            <img src="look1.jpg.jpg" onclick="openModal(this.src)" alt="Look 1">
            <img src="look2.jpg.jpg" onclick="openModal(this.src)" alt="Look 2">
            <img src="look3.jpg.jpg" onclick="openModal(this.src)" alt="Look 3">
            <img src="look4.jpg.jpg" onclick="openModal(this.src)" alt="Look 4">
            <img src="look5.jpg.jpg" onclick="openModal(this.src)" alt="Look 5">
            <img src="look6.jpg.jpg" onclick="openModal(this.src)" alt="Look 6">
        </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <img id="modal-img" src="" alt="Expanded View">
    </div>

    <script>
        function showLookbook() {
            document.getElementById('main').style.opacity = '0';
            document.getElementById('main').style.visibility = 'hidden';
            document.getElementById('lookbook').classList.add('active');
        }

        function hideLookbook(event) {
            if (event) event.preventDefault();
            document.getElementById('lookbook').classList.remove('active');
            document.getElementById('main').style.opacity = '1';
            document.getElementById('main').style.visibility = 'visible';
        }

        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
