<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NCBK - NEVER SEE BUT K</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a0f0a; font-family: 'Times New Roman', serif; overflow: hidden; }
        
        /* 메인: 동굴 배경 */
        #main { 
            height: 100vh; width: 100%; 
            background: url('cave.png') no-repeat center center/cover;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            position: fixed; top: 0; left: 0; z-index: 10;
            transition: opacity 1s ease, visibility 1s ease;
        }

        /* 룩북: 검은 배경 & 이미지 중앙 정렬 */
        #lookbook { 
            opacity: 0; visibility: hidden;
            background: #1a0f0a; /* 진한 갈색 배경 */
            padding: 40px; 
            min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; /* 가로 중앙 정렬 */
            transition: opacity 1s ease 0.3s, visibility 1s ease 0.3s;
        }
        #lookbook.active { opacity: 1; visibility: visible; overflow-y: auto; }
        
        /* 룩북 헤더 */
        #lookbook-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 0 40px 0; color: #bca08d; }
        #lookbook-title { font-size: 1.5rem; letter-spacing: 0.3rem; }
        #back-btn { padding: 10px 20px; border: 1px solid #bca08d; background: transparent; color: #bca08d; cursor: pointer; text-decoration: none; }

        /* 룩북 그리드 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 400px)); 
            gap: 30px; 
            justify-content: center; /* 그리드 내부 요소 중앙 정렬 */
        }
        .grid img { width: 100%; display: block; border: 1px solid #333; }
    </style>
</head>
<body>
    
    <div id="main" onclick="showLookbook()"></div>
    
    <div id="lookbook">
        <div id="lookbook-header">
            <div id="lookbook-title">NCPK — COLLECTION</div>
            <a href="#" id="back-btn" onclick="hideLookbook()">BACK</a>
        </div>
        <div class="grid">
            <img src="look1.jpg.jpg" alt="Look 1">
            <img src="look2.jpg.jpg" alt="Look 2">
            <img src="look3.jpg.jpg" alt="Look 3">
            <img src="look4.jpg.jpg" alt="Look 4">
            <img src="look5.jpg.jpg" alt="Look 5">
        </div>
    </div>

    <script>
        function showLookbook() {
            const main = document.getElementById('main');
            main.style.opacity = '0';
            main.style.visibility = 'hidden';
            
            const lookbook = document.getElementById('lookbook');
            lookbook.classList.add('active');
            document.body.style.overflow = 'auto';
        }

        function hideLookbook() {
            const lookbook = document.getElementById('lookbook');
            lookbook.classList.remove('active');
            
            const main = document.getElementById('main');
            main.style.opacity = '1';
            main.style.visibility = 'visible';
            document.body.style.overflow = 'hidden';
        }
    </script>
</body>
</html>
